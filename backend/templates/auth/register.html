{% extends 'base_auth.html' %}
{% block title %}注册 - 龙猫图书{% endblock %}

{% block extra_css %}
<style>
    body { 
        background-image: url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=1920&q=80'); 
        background-size: cover;
        background-position: center;
    }
    .register-container {
        backdrop-filter: blur(8px);
        background: rgba(255, 255, 255, 0.9);
    }
</style>
{% endblock %}

{% block content %}
<div class="fixed inset-0 flex items-center justify-center p-4">
    <div class="register-container w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden p-8 md:p-10 border border-white/50">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">新用户注册</h2>
            <p class="text-slate-500 mt-2">加入我们的阅读社区，开启智慧之旅</p>
        </div>

        <form method="post" action="{% url 'register' %}" class="space-y-5">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 gap-5">
                <div class="space-y-1">
                    <label class="text-sm font-semibold text-slate-700 ml-1">用户名</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" name="username" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="设置您的登录名">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-semibold text-slate-700 ml-1">手机号码</label>
                    <div class="relative">
                        <i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="tel" name="phone" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="常用联系电话">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-semibold text-slate-700 ml-1">登录密码</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" name="password" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="至少6位字符">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-semibold text-slate-700 ml-1">确认密码</label>
                    <div class="relative">
                        <i class="fas fa-shield-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" name="password_confirm" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="再次输入密码">
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-200 active:scale-95">
                    立即注册
                </button>
            </div>
        </form>

        <div class="mt-8 text-center text-sm">
            <span class="text-slate-500">已有账号？</span>
            <a href="{% url 'login' %}" class="text-indigo-600 font-bold hover:underline">返回登录</a>
        </div>
    </div>
</div>
{% endblock %}
