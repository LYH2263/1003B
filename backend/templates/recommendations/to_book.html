{% extends 'base.html' %}
{% block title %}转为入库 - 龙猫图书{% endblock %}
{% block page_title %}转为入库{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-book-medical text-2xl text-green-600"></i>
            </div>
            <h3 class="text-2xl font-bold text-slate-800">将荐书转为入库</h3>
            <p class="text-slate-500 mt-2">已预填荐书信息，请完善其他图书信息</p>
        </div>

        <div class="bg-green-50 rounded-xl p-4 mb-6 border border-green-200">
            <p class="text-sm text-green-700">
                <i class="fas fa-info-circle mr-2"></i>
                来源推荐：<strong>{{ recommendation.title }}</strong>（{{ recommendation.author }}）
            </p>
        </div>

        <form method="post" action="{% url 'book_create' %}" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">书名 <span class="text-red-500">*</span></label>
                    <input type="text" name="title" required value="{{ recommendation.title }}" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">作者 <span class="text-red-500">*</span></label>
                    <input type="text" name="author" required value="{{ recommendation.author }}" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">ISBN <span class="text-red-500">*</span></label>
                    <input type="text" name="isbn" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="请输入 ISBN">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">分类</label>
                    <select name="category" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                        <option value="">请选择分类</option>
                        {% for cat in categories %}
                        <option value="{{ cat.pk }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">简介</label>
                <textarea name="description" rows="4" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all resize-none" placeholder="请输入图书简介">{{ recommendation.reason }}</textarea>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">库存数量</label>
                    <input type="number" name="total_stock" value="1" min="0" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">封面图片</label>
                    <input type="file" name="cover" accept="image/*" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <a href="{% url 'recommendation_manage' %}" class="flex-1 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all text-center">返回管理</a>
                <button type="submit" class="flex-1 py-3 rounded-xl font-bold text-white bg-primary hover:bg-primary/90 transition-all shadow-lg shadow-primary/25">
                    <i class="fas fa-check mr-2"></i>确认入库
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
