{% extends 'base.html' %}
{% block title %}我要荐书 - 龙猫图书{% endblock %}
{% block page_title %}我要荐书{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-book-medical text-2xl text-primary"></i>
            </div>
            <h3 class="text-2xl font-bold text-slate-800">提交荐书申请</h3>
            <p class="text-slate-500 mt-2">推荐您喜欢的书籍，让更多人共享阅读的乐趣</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">书名 <span class="text-red-500">*</span></label>
                    <input type="text" name="title" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="请输入书名">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">作者 <span class="text-red-500">*</span></label>
                    <input type="text" name="author" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="请输入作者">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">出版社</label>
                <input type="text" name="publisher" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="请输入出版社（选填）">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">推荐理由 <span class="text-red-500">*</span> <span class="text-slate-400 font-normal">(不少于 50 字)</span></label>
                <textarea name="reason" rows="5" required minlength="50" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all resize-none" placeholder="请详细说明您推荐这本书的理由..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">紧急程度</label>
                <div class="grid grid-cols-3 gap-4">
                    <label class="flex items-center justify-center p-4 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                        <input type="radio" name="urgency" value="normal" checked class="sr-only">
                        <div class="text-center">
                            <i class="fas fa-clock text-slate-400 mb-2"></i>
                            <span class="block text-sm font-medium">普通</span>
                        </div>
                    </label>
                    <label class="flex items-center justify-center p-4 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                        <input type="radio" name="urgency" value="urgent" class="sr-only">
                        <div class="text-center">
                            <i class="fas fa-bolt text-amber-500 mb-2"></i>
                            <span class="block text-sm font-medium">较急</span>
                        </div>
                    </label>
                    <label class="flex items-center justify-center p-4 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                        <input type="radio" name="urgency" value="very_urgent" class="sr-only">
                        <div class="text-center">
                            <i class="fas fa-fire text-red-500 mb-2"></i>
                            <span class="block text-sm font-medium">非常期待</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <a href="{% url 'my_recommendations' %}" class="flex-1 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all text-center">查看我的荐书</a>
                <button type="submit" class="flex-1 py-3 rounded-xl font-bold text-white bg-primary hover:bg-primary/90 transition-all shadow-lg shadow-primary/25">提交推荐</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
